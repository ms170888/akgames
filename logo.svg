<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="kGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff44aa"/>
      <stop offset="100%" style="stop-color:#b44aff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="200" cy="200" r="195" fill="url(#bg)" stroke="#00ff88" stroke-width="3" filter="url(#glow)"/>
  
  <!-- Decorative stars (inspired by your drawing) -->
  <text x="80" y="95" font-size="28" filter="url(#glow)">⭐</text>
  <text x="290" y="80" font-size="22" filter="url(#glow)">⭐</text>
  <text x="55" y="310" font-size="18" filter="url(#glow)">⭐</text>
  <text x="310" y="300" font-size="24" filter="url(#glow)">⭐</text>
  <text x="170" y="70" font-size="16" filter="url(#glow)">✨</text>
  <text x="330" y="180" font-size="16" filter="url(#glow)">✨</text>
  
  <!-- Decorative hearts (from your drawing) -->
  <text x="115" y="335" font-size="20" filter="url(#glow)">❤️</text>
  <text x="260" y="340" font-size="16" filter="url(#glow)">💜</text>
  
  <!-- Game controller icon -->
  <text x="200" y="140" font-size="50" text-anchor="middle" filter="url(#bigGlow)">🎮</text>
  
  <!-- "AK" text - big and bold -->
  <text x="200" y="230" font-family="'Arial Black', 'Impact', sans-serif" font-size="100" font-weight="900" text-anchor="middle" fill="url(#kGrad)" filter="url(#bigGlow)" letter-spacing="5">AK</text>
  
  <!-- "GAMES" text below -->
  <text x="200" y="285" font-family="'Arial Black', 'Impact', sans-serif" font-size="48" font-weight="900" text-anchor="middle" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="12">GAMES</text>
  
  <!-- "by Maaz" credit -->
  <text x="200" y="330" font-family="Arial, sans-serif" font-size="16" text-anchor="middle" fill="#888" font-style="italic">by Maaz</text>
  
  <!-- Small decorative dots around the edge -->
  <circle cx="200" cy="18" r="4" fill="#00ff88" opacity="0.6"/>
  <circle cx="280" cy="40" r="3" fill="#00d4ff" opacity="0.5"/>
  <circle cx="340" cy="100" r="3" fill="#b44aff" opacity="0.5"/>
  <circle cx="360" cy="200" r="4" fill="#ff44aa" opacity="0.6"/>
  <circle cx="120" cy="40" r="3" fill="#ff44aa" opacity="0.5"/>
  <circle cx="50" cy="140" r="3" fill="#00ff88" opacity="0.5"/>
  <circle cx="40" cy="200" r="4" fill="#00d4ff" opacity="0.6"/>
  <circle cx="60" cy="280" r="3" fill="#b44aff" opacity="0.5"/>
  <circle cx="340" cy="280" r="3" fill="#00ff88" opacity="0.5"/>
  <circle cx="200" cy="385" r="4" fill="#ff44aa" opacity="0.6"/>
</svg>